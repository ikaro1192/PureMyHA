name: puremyha
arch: ${NFPM_ARCH}
platform: linux
version: ${VERSION}
maintainer: ""
description: MySQL 8.4 HA tool
homepage: https://github.com/shokashimizu/PureMyHA
license: MIT

contents:
  - src: dist-bins/puremyha
    dst: /usr/bin/puremyha
    file_info:
      mode: 0755
  - src: dist-bins/puremyhad
    dst: /usr/sbin/puremyhad
    file_info:
      mode: 0755
  - src: config/config.yaml.example
    dst: /etc/puremyha/config.yaml.example
    type: config|noreplace
  - src: packaging/puremyhad.service
    dst: /lib/systemd/system/puremyhad.service
  - src: packaging/puremyhad.logrotate
    dst: /etc/logrotate.d/puremyhad
    file_info:
      mode: 0644

scripts:
  postinstall: packaging/postinstall.sh
