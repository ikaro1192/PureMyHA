# PureMyHA configuration for the Pacemaker demo environment.
# Replace the MySQL node addresses with your actual MySQL cluster.
clusters:
  - name: main
    nodes:
      - host: db1
        port: 3306
      - host: db2
        port: 3306
    credentials:
      user: puremyha
      password_file: /etc/puremyha/mysql.pass

global:
  monitoring:
    interval: 3s
    connect_timeout: 2s
    replication_lag_warning: 10s
    replication_lag_critical: 30s
  failure_detection:
    recovery_block_period: 3600s
  failover:
    auto_failover: true
    min_replicas_for_failover: 1
