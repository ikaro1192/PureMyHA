name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Cache Cabal store
        uses: actions/cache@v5
        with:
          path: ~/.cabal/store
          key: cabal-${{ matrix.arch }}-${{ hashFiles('puremyha.cabal', 'cabal.project') }}
          restore-keys: cabal-${{ matrix.arch }}-

      - name: Build and test in Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cabal/store:/root/.cabal/store" \
            -w /workspace \
            haskell:9.6-bullseye \
            bash -c "cabal update && cabal build all && cabal test --test-show-details=always && \
              mkdir -p /workspace/dist-bins && \
              cp \"\$(cabal list-bin puremyhad)\" /workspace/dist-bins/puremyhad && \
              cp \"\$(cabal list-bin puremyha)\"  /workspace/dist-bins/puremyha"

      - name: Fix Cabal store permissions
        run: sudo chown -R "$USER" "$HOME/.cabal/store" || true

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.arch }}
          path: dist-bins/
          retention-days: 1

  e2e:
    name: E2E Tests (${{ matrix.arch }})
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.runner }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.arch }}
          path: dist-bins/

      - name: Make binaries executable
        run: chmod +x dist-bins/puremyhad dist-bins/puremyha

      - name: Run E2E tests
        env:
          STAGING: prebuilt
        run: |
          cd e2e
          bash run-all.sh
        timeout-minutes: 30

      - name: Dump logs on failure
        if: failure()
        run: |
          cd e2e
          docker compose logs puremyhad
          docker compose logs mysql-source
          docker compose logs mysql-replica1
          docker compose logs mysql-replica2
