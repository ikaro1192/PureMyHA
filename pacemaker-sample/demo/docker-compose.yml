services:
  # ---- MySQL nodes ----

  db1:
    image: mysql:8.4
    hostname: db1
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - ./config/mysql-source.cnf:/etc/mysql/conf.d/source.cnf:ro
      - ./config/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      cluster-net:
        ipv4_address: 192.168.100.21
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-prootpass"]
      interval: 2s
      timeout: 5s
      retries: 30

  db2:
    image: mysql:8.4
    hostname: db2
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - ./config/mysql-replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
      - ./config/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    depends_on:
      db1:
        condition: service_healthy
    networks:
      cluster-net:
        ipv4_address: 192.168.100.22
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-prootpass"]
      interval: 2s
      timeout: 5s
      retries: 30

  # ---- Pacemaker cluster nodes ----

  ha1:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    hostname: ha1
    # Pacemaker and Corosync require elevated privileges to manage
    # network interfaces (VIP) and process lifecycle.
    privileged: true
    depends_on:
      db1:
        condition: service_healthy
      db2:
        condition: service_healthy
    networks:
      cluster-net:
        ipv4_address: 192.168.100.11
    volumes:
      # Mount the puremyhad binary built from the repository root.
      # Build it first: docker build -t puremyha ../../ && docker cp ...
      # See the "Getting Started" section in README.md for the full build steps.
      - ../../dist-bins/puremyhad:/usr/sbin/puremyhad:ro
      - ./config/puremyha.yaml:/etc/puremyha/config.yaml:ro
      - ./config/mysql.pass:/etc/puremyha/mysql.pass:ro
      - ./config/repl.pass:/etc/puremyha/repl.pass:ro
      - ./config/haproxy.cfg:/etc/haproxy/haproxy.cfg:ro

  ha2:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    hostname: ha2
    privileged: true
    depends_on:
      db1:
        condition: service_healthy
      db2:
        condition: service_healthy
    networks:
      cluster-net:
        ipv4_address: 192.168.100.12
    volumes:
      - ../../dist-bins/puremyhad:/usr/sbin/puremyhad:ro
      - ./config/puremyha.yaml:/etc/puremyha/config.yaml:ro
      - ./config/mysql.pass:/etc/puremyha/mysql.pass:ro
      - ./config/repl.pass:/etc/puremyha/repl.pass:ro
      - ./config/haproxy.cfg:/etc/haproxy/haproxy.cfg:ro

  qdevice:
    build:
      context: ..
      dockerfile: demo/Dockerfile.qdevice
    hostname: qdevice
    networks:
      cluster-net:
        ipv4_address: 192.168.100.13

networks:
  cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
